name: Test tap-geekbot

on:
  push:
    branches: [main]
    paths:
    - tap_geekbot/**
    - tests/**
    - noxfile.py
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
    - .github/workflows/requirements.txt
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
    - tap_geekbot/**
    - tests/**
    - noxfile.py
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
    - .github/workflows/requirements.txt
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@f3d069d0f9a3c9169d1a483318bb0e09876a6fd6 # v2.15.0
        id: baipp

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-package
    env:
      NOXFORCEPYTHON: ${{ matrix.python-version }}
      NOXSESSION: tests
      UV_CONSTRAINT: ${{ github.workspace }}/.github/workflows/requirements.txt
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}

    - name: Install Nox
      run: |
        uv tool install nox
        nox --version

    - name: Run tests
      env:
        TAP_GEEKBOT_API_KEY: ${{ secrets.TAP_GEEKBOT_API_KEY }}
        TAP_GEEKBOT_START_DATE: ${{ secrets.TAP_GEEKBOT_START_DATE }}
      run: |
        nox --verbose
